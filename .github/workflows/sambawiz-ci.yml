name: SambaWiz CI

on:
  push:
    branches: [ main ]
    paths:
      - 'sambawiz/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'sambawiz/**'

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: sambawiz/package-lock.json

    - name: Install dependencies
      run: npm ci --prefix sambawiz

    - name: Run tests
      run: npm test --prefix sambawiz

    - name: Run linter
      run: npm run lint --prefix sambawiz
